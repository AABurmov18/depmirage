name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Smoke-test CLI — must flag the planted issues and exit 1
        shell: bash
        run: |
          depmirage scan examples/demo --offline --no-banner && code=0 || code=$?
          echo "exit code: $code"
          test "$code" = "1"

      - name: Smoke-test CLI — clean input must exit 0
        shell: bash
        run: |
          mkdir -p _clean && printf 'requests\nrich\n' > _clean/requirements.txt
          depmirage scan _clean --offline --no-banner
